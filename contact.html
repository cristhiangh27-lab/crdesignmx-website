  <link rel="icon" href="/favicon.ico" sizes="any">

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <title>Contacto — CR Collective</title>
  <meta name="description" content="Contacta a CR Collective para hablar de tu proyecto y agenda una llamada sobre alcances, tiempos y presupuesto.">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Contacto — CR Collective">
  <meta property="og:description" content="Comunícate con CR Collective para coordinar tu proyecto arquitectónico con BIM y visualización.">
  <meta property="og:url" content="https://crcollective.mx/contact.html">
  <meta property="og:image" content="https://crcollective.mx/img/brand/logo-cr-collective.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contacto — CR Collective">
  <meta name="twitter:description" content="Agenda una llamada con CR Collective para revisar tu proyecto y próximos pasos.">
  <meta name="twitter:image" content="https://crcollective.mx/img/brand/logo-cr-collective.png">

  <link rel="preload" as="image" href="img/brand/logo-cr-collective.png">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div data-include="header"></div>

  <main>
    <section class="page-hero">
      <p class="section-lead" data-i18n="contact.kicker">Let's talk about your project</p>
      <h1 data-i18n="contact.title">Contact</h1>
      <p data-i18n="contact.subtitle">Share your goals and schedule a call to review scope, timeline, and budget.</p>
    </section>

    <section class="project-hero" style="margin-bottom:1.5rem;">
      <div class="form-card" style="width:100%;">
        <!-- ✅ SOLO UN FORM -->
        <form id="contactForm">
          <div class="form-field">
            <label for="name" data-i18n="contact.form.name">Name</label>
            <input type="text" id="name" name="nombre" placeholder="Your name" data-i18n-placeholder="contact.form.namePlaceholder" required>
          </div>

          <div class="form-field">
            <label for="email" data-i18n="contact.form.email">Email</label>
            <input type="email" id="email" name="email" placeholder="name@email.com" data-i18n-placeholder="contact.form.emailPlaceholder" required>
          </div>

          <div class="form-field">
            <label for="message" data-i18n="contact.form.message">Message</label>
            <textarea id="message" name="mensaje" placeholder="Tell me about your project" data-i18n-placeholder="contact.form.messagePlaceholder" required></textarea>
          </div>

          <button class="btn btn-primary" id="submitBtn" type="submit" aria-label="Send contact form" data-i18n-aria="contact.form.submitAria">
            <span data-i18n="contact.form.submit">Send</span>
          </button>

          <p id="formStatus" style="margin-top:.75rem; opacity:.9;"></p>
        </form>
      </div>

      <div class="contact-info">
        <p><strong data-i18n="contact.info.email">Email:</strong> <a href="mailto:crpartners11@gmail.com">crpartners11@gmail.com</a></p>
        <p><strong data-i18n="contact.info.whatsapp">WhatsApp:</strong> <a href="https://wa.me/525514844480">+52 55 1484 4480</a></p>
        <p><strong data-i18n="contact.info.instagram">Instagram:</strong> <a href="https://www.instagram.com/cr.designmx/">@cr.designmx</a></p>
      </div>
    </section>
  </main>

  <div data-include="footer"></div>


  <script>
    // Año footer

    // Formulario -> Apps Script
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbzVbL12WIhjYYD7z_-VLF7w5_Ys1XZP4-_el0BglC4I1Yha-qDYGxCO6zSh9o29avs0Ow/exec";

    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("formStatus");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      statusEl.textContent = window.I18n?.t('contact.form.sending', 'Sending…');
      submitBtn.disabled = true;

      const data = new URLSearchParams(new FormData(form));

      try {
        await fetch(ENDPOINT, {
          method: "POST",
          mode: "no-cors", // ✅ evita CORS en GitHub Pages
          headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
          body: data.toString()
        });

        statusEl.textContent = window.I18n?.t('contact.form.success', '✅ Done. We will reply soon.');
        form.reset();

        const currentLang = window.__i18n?.lang || localStorage.getItem('lang') || 'en';
        window.location.href = `/thank-you?lang=${currentLang}`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = window.I18n?.t('contact.form.error', '❌ Could not send. Please try again or message us on WhatsApp.');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
  <script src="assets/js/includes.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      await window.SiteIncludes?.loadIncludes();
      await window.I18n?.initI18n();
      window.dispatchEvent(new Event('site-ready'));
    });
  </script>
</body>
</html>
